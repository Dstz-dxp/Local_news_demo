spring:
  application:
    name: points-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/local_news_demo?useSSL=false&serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8
    username: root
    password: 1234
    hikari:
      # 连接池中允许的最大连接数
      maximum-pool-size: 20
      # 最小空闲连接数
      minimum-idle: 20
      # 连接超时时间（毫秒）
      connection-timeout: 30000
      # 连接最大存活时间(毫秒)
      max-lifetime: 1800000
      # 连接空闲超时时间（毫秒,默认600000）
      idle-timeout: 600000

server:
  port: 8083

logging:
  level:
    com.ityang.localnewsdemo.mapper: DEBUG


